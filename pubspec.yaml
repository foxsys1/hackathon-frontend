name: kos_gdgoc
description: Risk Assessment application for rental listings.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  device_preview: ^1.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Data Modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.4.3+1

  # Local cache
  shared_preferences: ^2.2.3

  # File & Image picking
  file_picker: ^6.1.1
  image_picker: ^1.0.7

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.5
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
